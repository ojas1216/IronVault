# =============================================================================
# IronVault MDM — Nginx Reverse Proxy
# Replace yourdomain.com with your actual domain.
# TLS certs: place fullchain.pem + privkey.pem in ./nginx/certs/
# Obtain free certs: certbot certonly --standalone -d yourdomain.com
# =============================================================================

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream mdm_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream mdm_dashboard {
        server dashboard:80;
        keepalive 16;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name yourdomain.com api.yourdomain.com admin.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ── Admin Dashboard ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://api.yourdomain.com;" always;

        gzip on;
        gzip_vary on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://mdm_dashboard;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass         http://mdm_dashboard;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }

    # ── Backend API ───────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        client_max_body_size 10M;

        limit_req zone=api burst=60 nodelay;

        location / {
            proxy_pass         http://mdm_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }
}
