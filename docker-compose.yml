version: "3.9"

# =============================================================================
# IronVault MDM — Docker Compose
# =============================================================================
# Development:   docker compose up -d
# Production:    Set all vars in .env (see .env.production.example), then:
#                docker compose -f docker-compose.yml up -d
# =============================================================================

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mdm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdm_db}
      POSTGRES_USER: ${POSTGRES_USER:-mdm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm_user} -d ${POSTGRES_DB:-mdm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose port 5432 in production — access via internal Docker network only

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mdm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose port 6379 in production

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdm_backend
    restart: unless-stopped
    env_file: .env
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mdm_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-mdm_db}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mdm_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-mdm_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    volumes:
      - ./backend:/app
      - /secrets:/secrets:ro   # Firebase credentials, APNs keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"   # Direct access for dev; in production traffic comes via nginx
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Admin Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./admin_dashboard
      dockerfile: Dockerfile
      args:
        # In production, set this to your API domain: https://api.yourdomain.com/api/v1
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    container_name: mdm_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"   # Direct access for dev; in production traffic comes via nginx
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mdm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # TLS certs (Let's Encrypt or self-signed)
    depends_on:
      - backend
      - dashboard

volumes:
  postgres_data:
  redis_data:
