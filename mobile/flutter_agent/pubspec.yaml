name: company_mdm_agent
description: Enterprise Device Security Agent

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Firebase FCM
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.3

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Device info
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # App usage (Android only)
  app_usage: ^3.0.3

  # Network info
  connectivity_plus: ^6.0.3
  network_info_plus: ^5.0.0

  # Root/jailbreak detection
  flutter_jailbreak_detection: ^1.10.0

  # Local encrypted storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Background tasks
  workmanager: ^0.5.2
  flutter_background_service: ^5.0.5

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
